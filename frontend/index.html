<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mix-parser — CS2 Demo Analyzer</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<header>
  <h1 onclick="navigate('')">mix<span>-parser</span></h1>
  <button id="back-btn" onclick="navigate('')">← Dashboard</button>
  <button id="admin-btn" class="logged-out" onclick="adminBtnClick()">Admin</button>
</header>

<!-- Name modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal">
    <h2>What's your name?</h2>
    <input type="text" id="user-name-input" placeholder="Enter your name" maxlength="40"
      onkeydown="if(event.key==='Enter') submitName()"
      style="width:100%;padding:.55rem .8rem;background:#111318;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.9rem" />
    <div class="modal-actions">
      <button class="btn-login" onclick="submitName()">Continue</button>
    </div>
  </div>
</div>

<!-- Admin login modal -->
<div class="modal-overlay" id="login-modal" onclick="if(event.target===this) closeLoginModal()">
  <div class="modal">
    <h2>Admin Login</h2>
    <input type="password" id="admin-pw" placeholder="Password" onkeydown="if(event.key==='Enter') submitLogin()" />
    <div id="login-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
      <button class="btn-login"  onclick="submitLogin()">Login</button>
    </div>
  </div>
</div>

<div id="app"></div>

<script src="/static/js/utils.js"></script>
<script src="/static/js/auth.js"></script>
<script src="/static/js/leaderboard.js"></script>
<script src="/static/js/matches.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/team-picker.js"></script>
<script src="/static/js/match-detail.js"></script>
<script src="/static/js/player.js"></script>
<script src="/static/js/dashboard.js"></script>
<script src="/static/js/router.js"></script>

</body>
</html>
