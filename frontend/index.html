<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>mix-parser — CS2 Demo Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1c24;
      --border:   #2a2d38;
      --accent:   #f0a500;
      --ct:       #5baeff;
      --ct-bg:    #1a3a5c;
      --t:        #ff8c42;
      --t-bg:     #3a1a00;
      --green:    #4caf7d;
      --red:      #e05555;
      --muted:    #666;
      --text:     #e0e0e0;
      --text-dim: #888;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      padding: 0.9rem 2rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.06em;
      cursor: pointer;
    }
    header h1 span { color: var(--text-dim); font-weight: 400; }
    #back-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 5px;
      padding: 0.3rem 0.75rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    #back-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Layout ── */
    #app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.25rem; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 1rem;
    }

    /* ── Upload ── */
    .upload-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .drop-zone {
      flex: 1;
      min-width: 220px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      font-size: 0.9rem;
      color: var(--text-dim);
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: #1f2130;
      color: var(--text);
    }
    .drop-zone input { display: none; }
    .parse-btn {
      padding: 0.65rem 1.75rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .parse-btn:hover { background: #ffc030; }
    .parse-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }
    #upload-status { font-size: 0.82rem; color: var(--text-dim); min-height: 1.2em; }

    /* ── Leaderboard table ── */
    /* ── Team Picker ─────────────────────────────────────────────────────── */
    .tp-counter { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.75rem; }
    .tp-counter span { color: var(--accent); font-weight: 700; }
    .tp-player-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.25rem; margin: 0 0 1rem; }
    @media (max-width: 600px) { .tp-player-list { grid-template-columns: repeat(2, 1fr); } }
    .tp-row {
      display: flex; align-items: center;
      padding: 0.5rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #111318;
      cursor: pointer; font-size: 0.82rem;
      transition: background 0.12s, border-color 0.12s;
      user-select: none; gap: 0.5rem;
    }
    .tp-row:hover { background: #1a1c28; border-color: #2e3050; }
    .tp-row:hover { background: #1a1c28; }
    .tp-row.selected { background: #1e2110; }
    .tp-row-check { width: 1rem; font-size: 0.72rem; color: var(--accent); visibility: hidden; flex-shrink: 0; }
    .tp-row.selected .tp-row-check { visibility: visible; }
    .tp-row-name { flex: 1; }
    .tp-row.selected .tp-row-name { color: var(--accent); font-weight: 600; }
    .tp-row-rating { font-size: 0.78rem; color: var(--muted); min-width: 2.5rem; text-align: right; }
    .tp-row.selected .tp-row-rating { color: var(--accent); opacity: 0.8; }
    .tp-row-maps { display: none; }
    .tp-row-remove { font-size: 0.72rem; color: var(--muted); opacity: 0; padding: 0 0.15rem; flex-shrink: 0; }
    .tp-row:hover .tp-row-remove { opacity: 0.5; }
    .tp-row-remove:hover { opacity: 1 !important; color: var(--text); }
    .tp-generate-btn {
      padding: 0.55rem 1.5rem; background: var(--accent); color: #000;
      border: none; border-radius: 6px; font-weight: 700; font-size: 0.9rem;
      cursor: pointer; transition: background 0.15s;
    }
    .tp-generate-btn:disabled { background: #333; color: var(--muted); cursor: not-allowed; }
    .tp-generate-btn:not(:disabled):hover { background: #ffc030; }
    .tp-teams { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; margin-top: 1.5rem; }
    @media (max-width: 600px) { .tp-teams { grid-template-columns: 1fr; } }
    .tp-team { background: #111318; border-radius: 10px; padding: 1rem 1.25rem; }
    .tp-team-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 0.75rem; }
    .tp-team-a .tp-team-title { color: #5baeff; }
    .tp-team-b .tp-team-title { color: #f0a500; }
    .tp-team-row { display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0; border-bottom: 1px solid #1e2030; font-size: 0.85rem; }
    .tp-team-row:last-child { border-bottom: none; }
    .tp-team-avg { margin-top: 0.6rem; font-size: 0.78rem; color: var(--muted); text-align: right; }
    .tp-team-avg strong { color: var(--text); }
    .tp-diff { text-align: center; margin-top: 1rem; font-size: 0.8rem; color: var(--muted); }
    .tp-diff strong { color: var(--accent); }
    .tp-nav-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.25rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .tp-nav-card:hover {
      border-color: var(--accent);
      background: #181a24;
      transform: translateY(-2px);
    }
    .tp-nav-card:hover .tp-nav-icon,
    .tp-nav-card:hover .tp-nav-label { color: var(--accent); }
    .tp-nav-icon { font-size: 1.5rem; color: var(--muted); transition: color 0.2s; }
    .tp-nav-label {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      transition: color 0.2s;
    }
    .tp-tabs { display: flex; gap: 0.4rem; margin-top: 1.5rem; flex-wrap: wrap; }
    .tp-tab {
      display: flex; flex-direction: column; align-items: center;
      padding: 0.4rem 0.9rem; border-radius: 6px; border: 1px solid var(--border);
      background: #111318; color: var(--muted); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s; line-height: 1.3;
    }
    .tp-tab:hover { border-color: var(--accent); color: var(--text); }
    .tp-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    .tp-tab-diff { font-size: 0.65rem; font-weight: 400; opacity: 0.7; }
    .tp-tab.active .tp-tab-diff { opacity: 0.6; }
    .tp-add-guest { margin: 0.75rem 0 1rem; padding: 0.5rem 0.75rem; background: #111318; border-radius: 6px; border: 1px solid var(--border); }
    .tp-add-title { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.4rem; }
    .tp-add-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .tp-add-row input[type="text"] { flex: 1; min-width: 100px; padding: 0.3rem 0.5rem; background: #0d0f14; border: 1px solid var(--border); border-radius: 5px; color: var(--text); font-size: 0.78rem; }
    .tp-slider-wrap { display: flex; align-items: center; gap: 0.4rem; }
    .tp-slider-wrap input[type="range"] { width: 90px; accent-color: var(--accent); }
    .tp-slider-wrap span { min-width: 2rem; font-size: 0.78rem; font-weight: 700; color: var(--accent); }
    .tp-add-btn { padding: 0.3rem 0.75rem; background: var(--accent); color: #000; border: none; border-radius: 5px; font-weight: 700; font-size: 0.75rem; cursor: pointer; }
    .tp-add-btn:hover { background: #ffc030; }

    .lb-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .lb-table th {
      background: #111318;
      color: var(--accent);
      padding: 0.55rem 0.75rem;
      text-align: left;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      white-space: nowrap;
    }
    .lb-table th.sortable { cursor: pointer; user-select: none; }
    .lb-table th.sortable:hover { color: #fff; }
    .lb-table th.sort-active { color: #fff; }
    .lb-sort-arrow { margin-left: 0.3em; opacity: 0.7; }
    .stat-sub { color: var(--muted); font-size: 0.75em; }
    .lb-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e2030; }
    .lb-table tr:last-child td { border-bottom: none; }
    .lb-table tr:hover td { background: #1f2130; }
    .lb-table .rank { color: var(--muted); font-weight: 700; width: 2rem; }
    .lb-table .player-name { font-weight: 600; }
    .lb-table .matches-count { color: var(--muted); font-size: 0.78rem; }
    .lb-table .kd {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    /* ── Match grid ── */
    .grid-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }
    .section-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 1rem;
    }
    .matches-pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 0.3rem; margin-top: 1rem; flex-wrap: wrap;
    }
    .pg-btn {
      padding: 0.35rem 0.65rem; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.82rem; cursor: pointer;
      transition: border-color 0.15s, color 0.15s; min-width: 2rem; text-align: center;
    }
    .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
    .pg-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .pg-btn:disabled { opacity: 0.3; cursor: default; }
    .pg-info { font-size: 0.75rem; color: var(--muted); margin: 0 0.5rem; }
    .match-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
      overflow: hidden;
    }
    .match-tile:hover { border-color: var(--accent); transform: translateY(-2px); }
    .tile-map-img {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: 45%;
      object-fit: cover;
      opacity: 0.7;
      pointer-events: none;
      border-radius: 0 8px 8px 0;
      mask-image: linear-gradient(to right, transparent, black 40%);
      -webkit-mask-image: linear-gradient(to right, transparent, black 40%);
    }
    .match-tile:hover .tile-map-img { opacity: 1; transition: opacity 0.2s; }
    .tile-top { display: flex; align-items: baseline; justify-content: space-between; gap: 0.5rem; }
    .map-name { font-size: 1rem; font-weight: 700; color: var(--text); }
    .tile-date { font-size: 0.75rem; color: var(--muted); }
    .tile-sides { display: flex; gap: 0.5rem; align-items: center; font-size: 0.8rem; }
    .side-ct { color: var(--ct); font-weight: 600; }
    .side-t  { color: var(--t);  font-weight: 600; }
    .side-sep { color: var(--muted); }
    .tile-rounds { font-size: 0.78rem; color: var(--muted); }
    .tile-mvp {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
    }
    .mvp-label { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .mvp-name { flex: 1; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .empty-state { color: var(--muted); font-size: 0.9rem; padding: 2rem 0; text-align: center; }

    .delete-btn {
      background: none;
      border: none;
      color: #444;
      cursor: pointer;
      font-size: 1rem;
      padding: 0.1rem 0.25rem;
      border-radius: 4px;
      line-height: 1;
      transition: color .15s, background .15s;
      flex-shrink: 0;
    }
    .delete-btn:hover { color: var(--red); background: #2a1818; }

    /* ── Rating colours ── */
    .r-high { color: var(--green); font-weight: 700; }
    .r-mid  { color: var(--accent); font-weight: 700; }
    .r-low  { color: var(--red);   font-weight: 700; }

    /* ── Match detail ── */
    .rating-board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 640px) { .rating-board { grid-template-columns: 1fr; } }
    .rating-team h3 {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; padding: 0.3rem 0.75rem;
      margin-bottom: 0.5rem; border-radius: 4px;
    }
    .rating-team.ct h3 { background: var(--ct-bg); color: var(--ct); }
    .rating-team.t  h3 { background: var(--t-bg);  color: var(--t); }
    .rating-row {
      display: flex; align-items: center;
      padding: 0.45rem 0.75rem; border-radius: 5px;
      margin-bottom: 0.25rem; background: #111318;
      gap: 0.5rem;
    }
    .rating-row-name { font-size: 0.9rem; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rating-row-meta { display: flex; gap: 0.6rem; font-size: 0.72rem; color: var(--text-dim); flex-wrap: wrap; }
    .rating-row-meta b { color: var(--text); }
    .rating-num { font-size: 1.05rem; font-weight: 800; min-width: 3rem; text-align: right; }
    .formula-note { margin-top: 0.75rem; font-size: 0.7rem; color: #444; }
    .detail-tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
    .detail-tab {
      padding: 0.35rem 1rem; border-radius: 5px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.78rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      cursor: pointer; transition: all 0.15s;
    }
    .detail-tab:hover { border-color: var(--accent); color: var(--text); }
    .detail-tab.active { border-color: var(--accent); color: var(--accent); }
    .ov-row {
      display: flex; align-items: center;
      padding: 0.65rem 0.75rem; border-radius: 5px;
      margin-bottom: 0.25rem; background: #111318; gap: 0.5rem;
    }
    .ov-row-name { font-size: 0.95rem; font-weight: 600; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ov-stat { display: flex; flex-direction: column; align-items: center; min-width: 2.8rem; }
    .ov-stat-val { font-size: 0.95rem; font-weight: 700; }
    .ov-stat-lbl { font-size: 0.62rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .kv-grid { display: grid; grid-template-columns: max-content 1fr; gap: 0.25rem 1.25rem; font-size: 0.85rem; }
    .kv-grid dt { color: var(--text-dim); }
    .kv-grid dd { word-break: break-all; }

    /* ── Match hero ── */
    .match-hero {
      position: relative; border-radius: 10px; overflow: hidden;
      margin-bottom: 1.25rem; min-height: 200px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .match-hero-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      z-index: 0;
    }
    .match-hero-overlay {
      position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.75) 60%, var(--bg) 100%);
    }
    .match-hero-content {
      position: relative; z-index: 2;
      padding: 1.5rem 1.75rem 1.75rem;
    }
    .match-hero-map {
      font-size: 1.6rem; font-weight: 800; color: #fff;
      letter-spacing: 0.02em; margin-bottom: 0.75rem;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    .match-hero-admin { float: right; }
    .match-hero .kv-grid { font-size: 0.82rem; }
    .match-hero .kv-grid dt { color: rgba(255,255,255,0.45); }
    .match-hero .kv-grid dd { color: rgba(255,255,255,0.85); }

    .tag {
      display: inline-block; padding: 0.15rem 0.5rem;
      border-radius: 4px; font-size: 0.75rem; font-weight: 600;
    }
    .tag.ct  { background: var(--ct-bg); color: var(--ct); }
    .tag.t   { background: var(--t-bg);  color: var(--t); }
    .tag.hs  { background: #3a1a1a; color: #ff4a4a; }

    .table-wrap { overflow-x: auto; max-height: 340px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { background: #111318; color: var(--accent); padding: 0.5rem 0.75rem; text-align: left; font-weight: 600; position: sticky; top: 0; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    td { padding: 0.4rem 0.75rem; border-bottom: 1px solid #1e2030; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1f2130; }

    .events-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .ev-badge {
      background: #111318; border: 1px solid var(--border);
      border-radius: 4px; padding: 0.2rem 0.5rem;
      font-size: 0.75rem; color: #aaa;
    }

    .stat-row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat .num { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 0.1rem; }

    /* ── Charts ── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 720px) { .charts-row { grid-template-columns: 1fr; } }
    .chart-wrap { position: relative; }
    .chart-wrap canvas { display: block; }

    .loading { color: var(--muted); text-align: center; padding: 4rem; font-size: 0.9rem; }
    .error   { color: var(--red);   text-align: center; padding: 2rem; }

    .download-btn {
      padding: 0.4rem 1rem; font-size: 0.8rem;
      background: #111318; color: var(--accent);
      border: 1px solid var(--accent); border-radius: 5px;
      cursor: pointer; transition: background .2s;
    }
    .download-btn:hover { background: #1f2130; }

    /* ── Admin ── */
    #admin-btn {
      margin-left: auto;
      padding: 0.3rem 0.85rem;
      font-size: 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background .2s, border-color .2s, color .2s;
    }
    #admin-btn.logged-out {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
    }
    #admin-btn.logged-out:hover { border-color: var(--accent); color: var(--accent); }
    #admin-btn.logged-in {
      background: none; border: 1px solid var(--red); color: var(--red);
    }
    #admin-btn.logged-in:hover { background: #2a1818; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 2rem 2.25rem; min-width: 320px;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal h2 { font-size: 1rem; color: var(--accent); }
    .modal input[type=password] {
      width: 100%; padding: 0.55rem 0.8rem;
      background: #111318; border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-size: 0.9rem;
    }
    .modal input[type=password]:focus { outline: none; border-color: var(--accent); }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .modal-actions button {
      padding: 0.45rem 1.1rem; border-radius: 5px; font-size: 0.85rem;
      cursor: pointer; transition: background .2s;
    }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-cancel:hover { border-color: var(--text-dim); }
    .btn-login  { background: var(--accent); border: none; color: var(--bg); font-weight: 700; }
    .btn-login:hover { background: #ffc030; }
    #login-error { font-size: 0.8rem; color: var(--red); min-height: 1em; }
  </style>
</head>
<body>

<header>
  <h1 onclick="navigate('')">mix<span>-parser</span></h1>
  <button id="back-btn" onclick="navigate('')">← Dashboard</button>
  <button id="admin-btn" class="logged-out" onclick="adminBtnClick()">Admin</button>
</header>

<!-- Name modal -->
<div class="modal-overlay" id="name-modal">
  <div class="modal">
    <h2>What's your name?</h2>
    <input type="text" id="user-name-input" placeholder="Enter your name" maxlength="40"
      onkeydown="if(event.key==='Enter') submitName()" style="width:100%;padding:.55rem .8rem;background:#111318;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:.9rem" />
    <div class="modal-actions">
      <button class="btn-login" onclick="submitName()">Continue</button>
    </div>
  </div>
</div>

<!-- Admin login modal -->
<div class="modal-overlay" id="login-modal" onclick="if(event.target===this) closeLoginModal()">
  <div class="modal">
    <h2>Admin Login</h2>
    <input type="password" id="admin-pw" placeholder="Password" onkeydown="if(event.key==='Enter') submitLogin()" />
    <div id="login-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeLoginModal()">Cancel</button>
      <button class="btn-login"  onclick="submitLogin()">Login</button>
    </div>
  </div>
</div>

<div id="app"></div>

<script>
// ── User name ─────────────────────────────────────────────────────────────────

function getUserName() { return localStorage.getItem('user_name') || ''; }

function submitName() {
  const val = document.getElementById('user-name-input').value.trim();
  if (!val) return;
  localStorage.setItem('user_name', val);
  document.getElementById('name-modal').classList.remove('open');
}

function maybeAskName() {
  if (!getUserName()) {
    document.getElementById('name-modal').classList.add('open');
    setTimeout(() => document.getElementById('user-name-input').focus(), 50);
  }
}

// ── Admin auth ────────────────────────────────────────────────────────────────

function getAdminToken() { return sessionStorage.getItem('admin_token'); }
function isAdmin() { return !!getAdminToken(); }

function updateAdminBtn() {
  const btn = document.getElementById('admin-btn');
  if (isAdmin()) {
    btn.textContent = 'Logout';
    btn.className = 'logged-in';
  } else {
    btn.textContent = 'Admin';
    btn.className = 'logged-out';
  }
}

function adminBtnClick() {
  if (isAdmin()) {
    adminLogout();
  } else {
    document.getElementById('login-modal').classList.add('open');
    document.getElementById('admin-pw').value = '';
    document.getElementById('login-error').textContent = '';
    setTimeout(() => document.getElementById('admin-pw').focus(), 50);
  }
}

function closeLoginModal() {
  document.getElementById('login-modal').classList.remove('open');
}

async function submitLogin() {
  const pw = document.getElementById('admin-pw').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (!res.ok) { errEl.textContent = 'Invalid password.'; return; }
    const data = await res.json();
    sessionStorage.setItem('admin_token', data.token);
    closeLoginModal();
    updateAdminBtn();
    // Re-render to show delete buttons
    router();
  } catch (e) {
    errEl.textContent = `Error: ${e.message}`;
  }
}

async function adminLogout() {
  const token = getAdminToken();
  if (token) {
    await fetch('/admin/logout', {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` },
    }).catch(() => {});
    sessionStorage.removeItem('admin_token');
  }
  updateAdminBtn();
  router();
}

// ── Router ───────────────────────────────────────────────────────────────────

const app = document.getElementById('app');
const backBtn = document.getElementById('back-btn');

function navigate(hash) {
  location.hash = hash;
}

async function router() {
  const raw  = location.hash.replace('#', '');
  const [view, param] = raw.split('/');

  if (view === 'match' && param) {
    backBtn.style.display = 'block';
    await renderMatchDetail(param);
  } else if (view === 'player' && param) {
    backBtn.style.display = 'block';
    await renderPlayerProfile(param);
  } else if (view === 'team-picker') {
    backBtn.style.display = 'block';
    await renderTeamPicker();
  } else {
    backBtn.style.display = 'none';
    await renderDashboard();
  }
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', () => { updateAdminBtn(); maybeAskName(); router(); });


// ── Helpers ──────────────────────────────────────────────────────────────────

function rClass(r) {
  if (r == null) return '';
  return r >= 1.15 ? 'r-high' : r >= 0.85 ? 'r-mid' : 'r-low';
}

function tag(text, cls) {
  return `<span class="tag ${cls}">${text}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtRating(r) {
  if (r == null) return '—';
  return `<span class="${rClass(r)}">${Number(r).toFixed(2)}</span>`;
}


// ── Dashboard ─────────────────────────────────────────────────────────────────

async function renderDashboard() {
  app.innerHTML = '<div class="loading">Loading…</div>';

  let matches = [], leaderboard = { players: [], guests: [] }, stats = { player_history: [], map_distribution: {} };
  try {
    [matches, leaderboard, stats] = await Promise.all([
      fetch('/matches').then(r => r.json()),
      fetch('/leaderboard').then(r => r.json()),
      fetch('/stats').then(r => r.json()),
    ]);
  } catch (e) {
    app.innerHTML = `<div class="error">Could not reach server: ${e.message}</div>`;
    return;
  }

  app.innerHTML = `
    <div class="tp-nav-card" onclick="navigate('team-picker')">
      <span class="tp-nav-icon">🎲</span>
      <span class="tp-nav-label">Pick Teams</span>
    </div>
    ${uploadCard()}
    ${leaderboardCard(leaderboard)}
    ${chartsSection(stats, leaderboard.players)}
    ${matchesSection(matches)}
  `;

  initUpload();
  renderCharts(stats, leaderboard.players);
}

function uploadCard() {
  return `<div class="card">
    <div class="card-title">Upload Demo</div>
    <div class="upload-area">
      <div class="drop-zone" id="dropzone">
        <input type="file" id="fileInput" accept=".dem,.bz2,.gz" />
        <span id="drop-label">Drop .dem / .dem.bz2 / .dem.gz here — or click to browse</span>
      </div>
      <button class="parse-btn" id="parseBtn" disabled>Analyze</button>
    </div>
    <div id="upload-status"></div>
  </div>`;
}

// ── Team Picker ───────────────────────────────────────────────────────────────

let _tpAllPlayers  = [];   // full player list from leaderboard (+ custom guests)
let _tpSelected    = new Set();
let _tpCustomSeq   = 0;    // counter for unique custom player ids

async function renderTeamPicker() {
  app.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const lb = await fetch('/leaderboard').then(r => r.json());
    _tpAllPlayers = [...(lb.players ?? []), ...(lb.guests ?? [])];
    _tpSelected   = new Set();
    _tpCustomSeq  = 0;
    app.innerHTML = buildTeamPickerHTML();
  } catch (e) {
    app.innerHTML = `<div class="error">Could not reach server: ${e.message}</div>`;
  }
}

function buildTeamPickerHTML() {
  const count = _tpSelected.size;

  const sortedPlayers = [..._tpAllPlayers].sort((a, b) => (b.avg_rating ?? 0) - (a.avg_rating ?? 0));
  const rows = sortedPlayers.map(p => {
    const sel = _tpSelected.has(p.steamid);
    const removeBtn = p._custom
      ? `<span class="tp-row-remove" onclick="event.stopPropagation();tpRemoveCustom('${p.steamid}')" title="Remove">✕</span>`
      : '';
    const mapsLabel = p._custom ? `<span class="tp-row-maps">new</span>` : `<span class="tp-row-maps">${p.matches_played} maps</span>`;
    return `<div class="tp-row${sel ? ' selected' : ''}" onclick="tpToggle('${p.steamid}')">
      <span class="tp-row-check">✓</span>
      <span class="tp-row-name">${esc(p.name || p.steamid)}</span>
      ${mapsLabel}
      <span class="tp-row-rating">${fmtRating(p.avg_rating)}</span>
      ${removeBtn}
    </div>`;
  }).join('');

  const teamsHTML = '';

  return `<div class="card">
    <div class="card-title">Team Picker</div>
    <p style="font-size:0.82rem;color:var(--muted);margin:0 0 0.75rem">Select exactly 10 players to generate balanced teams.</p>
    <div class="tp-counter">Selected: <span>${count}</span> / 10</div>
    <div class="tp-player-list">${rows}</div>

    <div class="tp-add-guest">
      <div class="tp-add-title">Player not in the system? <span style="font-weight:400;text-transform:none;letter-spacing:0;opacity:0.6">Add manually with estimated rating</span></div>
      <div class="tp-add-row">
        <input id="tp-guest-name" type="text" placeholder="Name" maxlength="40" />
        <div class="tp-slider-wrap">
          <input id="tp-guest-rating" type="range" min="0.4" max="2.0" step="0.01" value="1.00"
            oninput="document.getElementById('tp-guest-rating-val').textContent = parseFloat(this.value).toFixed(2)" />
          <span id="tp-guest-rating-val">1.00</span>
        </div>
        <button class="tp-add-btn" onclick="tpAddCustom()">Add</button>
      </div>
    </div>

    <button class="tp-generate-btn" ${count !== 10 ? 'disabled' : ''} onclick="tpGenerate()">
      Generate Teams
    </button>
    <div id="tp-result">${teamsHTML}</div>
  </div>`;
}

function tpRefresh() {
  _tpProposals = [];
  const card = document.querySelector('#app .card');
  if (card) card.outerHTML = buildTeamPickerHTML();
}

function tpToggle(steamid) {
  if (_tpSelected.has(steamid)) {
    _tpSelected.delete(steamid);
  } else {
    if (_tpSelected.size >= 10) return;
    _tpSelected.add(steamid);
  }
  tpRefresh();
}

function tpAddCustom() {
  const nameEl   = document.getElementById('tp-guest-name');
  const ratingEl = document.getElementById('tp-guest-rating');
  const name     = nameEl.value.trim();
  if (!name) { nameEl.focus(); return; }
  const rating   = parseFloat(ratingEl.value);
  const id       = `__custom_${++_tpCustomSeq}`;
  _tpAllPlayers.push({ steamid: id, name, avg_rating: rating, matches_played: 0, _custom: true });
  if (_tpSelected.size < 10) _tpSelected.add(id);
  tpRefresh();
}

function tpRemoveCustom(id) {
  _tpAllPlayers = _tpAllPlayers.filter(p => p.steamid !== id);
  _tpSelected.delete(id);
  tpRefresh();
}

let _tpProposals = [];   // sorted list of {mask, diff} for the current pool
let _tpActiveTab = 0;

function tpGenerate() {
  const pool = _tpAllPlayers.filter(p => _tpSelected.has(p.steamid));
  if (pool.length !== 10) return;

  // Collect all 126 unique splits (mask < mirror), sort by diff asc
  const splits = [];
  for (let mask = 1; mask < (1 << 10); mask++) {
    if (popcount(mask) !== 5) continue;
    const mirror = ((1 << 10) - 1) ^ mask;
    if (mask > mirror) continue;   // skip duplicates
    const sumA = pool.reduce((s, p, i) => mask & (1<<i) ? s + (p.avg_rating ?? 0) : s, 0);
    const sumB = pool.reduce((s, p, i) => mask & (1<<i) ? s : s + (p.avg_rating ?? 0), 0);
    splits.push({ mask, diff: Math.abs(sumA - sumB) });
  }
  splits.sort((a, b) => a.diff - b.diff);

  _tpProposals = splits.slice(0, 6);
  _tpActiveTab = 0;
  document.getElementById('tp-result').innerHTML = buildTeamsHTML(pool);
}

function tpSwitchTab(idx) {
  _tpActiveTab = idx;
  const pool = _tpAllPlayers.filter(p => _tpSelected.has(p.steamid));
  document.getElementById('tp-result').innerHTML = buildTeamsHTML(pool);
}

function buildTeamsHTML(pool) {
  if (!_tpProposals.length || pool.length !== 10) return '';

  const { mask, diff } = _tpProposals[_tpActiveTab];
  const teamA = pool.filter((_, i) =>  (mask & (1<<i)));
  const teamB = pool.filter((_, i) => !(mask & (1<<i)));
  const avgA  = (teamA.reduce((s,p) => s + (p.avg_rating ?? 0), 0) / 5).toFixed(4);
  const avgB  = (teamB.reduce((s,p) => s + (p.avg_rating ?? 0), 0) / 5).toFixed(4);

  const teamRows = (list) => [...list]
    .sort((a,b) => b.avg_rating - a.avg_rating)
    .map(p => `<div class="tp-team-row">
      <span>${esc(p.name || p.steamid)}</span>
      <span class="${rClass(p.avg_rating)}">${fmtRating(p.avg_rating)}</span>
    </div>`).join('');

  const tabs = _tpProposals.map((s, i) => `
    <button class="tp-tab${i === _tpActiveTab ? ' active' : ''}" onclick="tpSwitchTab(${i})">
      ${i === 0 ? 'Best' : `#${i + 1}`}
      <span class="tp-tab-diff">${s.diff.toFixed(3)}</span>
    </button>`).join('');

  return `<div class="tp-tabs">${tabs}</div>
  <div class="tp-teams">
    <div class="tp-team tp-team-a">
      <div class="tp-team-title">Team A</div>
      ${teamRows(teamA)}
      <div class="tp-team-avg">Avg rating: <strong>${avgA}</strong></div>
    </div>
    <div class="tp-team tp-team-b">
      <div class="tp-team-title">Team B</div>
      ${teamRows(teamB)}
      <div class="tp-team-avg">Avg rating: <strong>${avgB}</strong></div>
    </div>
  </div>
  <div class="tp-diff">Rating difference: <strong>${diff.toFixed(4)}</strong></div>`;
}

function popcount(n) {
  let c = 0; while (n) { c += n & 1; n >>>= 1; } return c;
}

// ── Leaderboard sort state ─────────────────────────────────────────────────────
let _lbData   = { players: [], guests: [] };
let _lbSort   = { key: 'avg_rating', dir: 1 }; // 1 = desc, -1 = asc

function lbSort(key) {
  if (_lbSort.key === key) {
    _lbSort.dir *= -1;
  } else {
    _lbSort.key = key;
    _lbSort.dir = 1;
  }
  const card = document.getElementById('leaderboard-card');
  if (card) card.outerHTML = leaderboardCard(_lbData);
}

function leaderboardCard(lb) {
  _lbData = lb;
  const { players = [], guests = [] } = lb;
  if (!players.length && !guests.length) {
    return `<div class="card" id="leaderboard-card"><div class="card-title">Overall Leaderboard</div><p class="empty-state">No data yet — upload some demos.</p></div>`;
  }

  const openPct = p => p.total_opening_attempts
    ? Math.round(p.total_opening_kills / p.total_opening_attempts * 100)
    : null;
  const kdRatio = p => p.total_deaths
    ? (p.total_kills / p.total_deaths).toFixed(2)
    : null;
  const clutchDisplay = p => p.total_clutch_total
    ? `${Math.round(p.total_clutch_won / p.total_clutch_total * 100)}% <span class="stat-sub">(${p.total_clutch_won}/${p.total_clutch_total})</span>`
    : '—';

  // Sort key → numeric value extractor
  const sortVal = {
    avg_rating:           p => p.avg_rating ?? -Infinity,
    avg_adr:              p => p.avg_adr ?? -Infinity,
    avg_kast:             p => p.avg_kast ?? -Infinity,
    avg_hs_pct:           p => p.avg_hs_pct ?? -Infinity,
    kd:                   p => p.total_deaths ? p.total_kills / p.total_deaths : -Infinity,
    opening_pct:          p => p.total_opening_attempts ? p.total_opening_kills / p.total_opening_attempts : -Infinity,
    clutch:               p => p.total_clutch_total ? p.total_clutch_won / p.total_clutch_total : -Infinity,
    total_flash_enemies:  p => p.total_flash_enemies ?? -Infinity,
    total_knife_kills:    p => p.total_knife_kills ?? -Infinity,
    total_zeus_kills:     p => p.total_zeus_kills ?? -Infinity,
    matches_played:       p => p.matches_played ?? -Infinity,
  };

  const sorted = (list) => [...list].sort((a, b) =>
    _lbSort.dir * (sortVal[_lbSort.key](b) - sortVal[_lbSort.key](a))
  );

  const arrow = (key) => {
    if (_lbSort.key !== key) return '';
    return `<span class="lb-sort-arrow">${_lbSort.dir === -1 ? '▼' : '▲'}</span>`;
  };

  const th = (label, key) =>
    `<th class="sortable${_lbSort.key === key ? ' sort-active' : ''}" onclick="lbSort('${key}')">${label}${arrow(key)}</th>`;

  const thead = `<thead><tr>
    <th></th><th>Player</th>
    ${th('Rating',   'avg_rating')}
    ${th('ADR',      'avg_adr')}
    ${th('KAST',     'avg_kast')}
    ${th('HS%',      'avg_hs_pct')}
    ${th('K/D',      'kd')}
    ${th('Opening%', 'opening_pct')}
    ${th('Clutch',   'clutch')}
    ${th('Flashes',  'total_flash_enemies')}
    ${th('🔪',       'total_knife_kills')}
    ${th('⚡',       'total_zeus_kills')}
    ${th('Maps',     'matches_played')}
  </tr></thead>`;

  const buildRows = (list) => sorted(list).map((p, i) => `<tr>
    <td class="rank">#${i + 1}</td>
    <td class="player-name" style="cursor:pointer;color:var(--accent)" onclick="navigate('player/${p.steamid}')">${esc(p.name || p.steamid)}</td>
    <td>${fmtRating(p.avg_rating)}</td>
    <td>${p.avg_adr ?? '—'}</td>
    <td>${p.avg_kast != null ? p.avg_kast + '%' : '—'}</td>
    <td>${p.avg_hs_pct != null ? p.avg_hs_pct + '%' : '—'}</td>
    <td class="kd">${kdRatio(p) != null ? `${kdRatio(p)} <span class="stat-sub">(${p.total_kills}/${p.total_deaths})</span>` : '—'}</td>
    <td>${openPct(p) != null ? openPct(p) + '%' : '—'}</td>
    <td>${clutchDisplay(p)}</td>
    <td>${p.total_flash_enemies ?? '—'}</td>
    <td>${p.total_knife_kills || '—'}</td>
    <td>${p.total_zeus_kills  || '—'}</td>
    <td class="matches-count">${p.matches_played}</td>
  </tr>`).join('');

  const playersTable = players.length ? `
    <div class="table-wrap">
      <table class="lb-table">
        ${thead}
        <tbody>${buildRows(players)}</tbody>
      </table>
    </div>` : `<p class="empty-state">No regulars yet.</p>`;

  const guestsSection = guests.length ? `
    <div class="card-title" style="margin-top:1.5rem">Guests <span style="font-size:0.75rem;font-weight:normal;opacity:0.6">(fewer than 5 maps)</span></div>
    <div class="table-wrap">
      <table class="lb-table">
        ${thead}
        <tbody>${buildRows(guests)}</tbody>
      </table>
    </div>` : '';

  return `<div class="card" id="leaderboard-card">
    <div class="card-title">Leaderboard</div>
    ${playersTable}
    ${guestsSection}
  </div>`;
}

const MATCHES_PER_PAGE = 6;
let _matchesPage = 1;
let _matchesAll  = [];

function matchesSection(matches) {
  _matchesAll  = matches;
  _matchesPage = 1;
  return renderMatchesSection();
}

function renderMatchesSection() {
  const matches   = _matchesAll;
  const totalPages = Math.max(1, Math.ceil(matches.length / MATCHES_PER_PAGE));
  const page      = Math.min(_matchesPage, totalPages);
  const start     = (page - 1) * MATCHES_PER_PAGE;
  const slice     = matches.slice(start, start + MATCHES_PER_PAGE);

  const header = `<div class="grid-header">
    <span class="section-title">Matches (${matches.length})</span>
  </div>`;

  if (!matches.length) {
    return header + `<p class="empty-state">No matches yet. Upload a demo above.</p>`;
  }

  const tiles = slice.map(m => {
    const date      = fmtDate(m.uploaded_at);
    const ratingNum = m.top_player_rating != null ? Number(m.top_player_rating).toFixed(2) : '—';
    const mapImg    = m.map_name
      ? `<img class="tile-map-img" src="/static/maps/${encodeURIComponent(m.map_name)}.png" alt="" onerror="this.style.display='none'">`
      : '';

    return `<div class="match-tile" onclick="navigate('match/${m.id}')">
      ${mapImg}
      <div class="tile-top">
        <span class="map-name">${esc(m.map_name || 'Unknown Map')}</span>
        <span class="tile-date">${date}</span>
        ${isAdmin() ? `<button class="delete-btn" title="Remove match" onclick="event.stopPropagation(); deleteMatch(${m.id}, this)">✕</button>` : ''}
      </div>
      <div class="tile-sides">
        <span class="side-ct">CT</span>
        <span class="side-sep">vs</span>
        <span class="side-t">T</span>
      </div>
      <div class="tile-rounds">${m.total_rounds ?? '?'} rounds${m.uploaded_by ? ` · <span style="color:var(--text-dim)">by ${esc(m.uploaded_by)}</span>` : ''}</div>
      ${m.top_player_name ? `<div class="tile-mvp">
        <span class="mvp-label">MVP</span>
        <span class="mvp-name" title="${esc(m.top_player_name)}">${esc(m.top_player_name)}</span>
        <span class="${rClass(m.top_player_rating)}">${ratingNum}</span>
      </div>` : ''}
    </div>`;
  }).join('');

  // Page number buttons (show up to 7, with ellipsis logic)
  const pageNums = [];
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
      pageNums.push(i);
    } else if (pageNums[pageNums.length - 1] !== '…') {
      pageNums.push('…');
    }
  }

  const pgBtns = pageNums.map(p =>
    p === '…'
      ? `<span class="pg-info">…</span>`
      : `<button class="pg-btn${p === page ? ' active' : ''}" onclick="matchesGoTo(${p})">${p}</button>`
  ).join('');

  const pagination = totalPages > 1 ? `
    <div class="matches-pagination">
      <button class="pg-btn" onclick="matchesGoTo(${page - 1})" ${page === 1 ? 'disabled' : ''}>‹</button>
      ${pgBtns}
      <button class="pg-btn" onclick="matchesGoTo(${page + 1})" ${page === totalPages ? 'disabled' : ''}>›</button>
      <span class="pg-info">Page ${page} of ${totalPages}</span>
    </div>` : '';

  return `<div id="matches-section">${header}<div class="matches-grid">${tiles}</div>${pagination}</div>`;
}

function matchesGoTo(page) {
  const totalPages = Math.ceil(_matchesAll.length / MATCHES_PER_PAGE);
  _matchesPage = Math.max(1, Math.min(page, totalPages));
  const el = document.getElementById('matches-section');
  if (el) el.outerHTML = renderMatchesSection();
}


// ── Upload logic ──────────────────────────────────────────────────────────────

function initUpload() {
  const dz       = document.getElementById('dropzone');
  const input    = document.getElementById('fileInput');
  const btn      = document.getElementById('parseBtn');
  const statusEl = document.getElementById('upload-status');
  const label    = document.getElementById('drop-label');

  if (!dz) return;
  let file = null;

  dz.addEventListener('click', () => input.click());
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', () => { if (input.files[0]) pick(input.files[0]); });

  function pick(f) {
    file = f;
    label.textContent = `${f.name}  (${(f.size/1024/1024).toFixed(1)} MB)`;
    btn.disabled = false;
    statusEl.textContent = '';
  }

  btn.addEventListener('click', async () => {
    if (!file) return;
    btn.disabled = true;
    statusEl.style.color = 'var(--text-dim)';
    statusEl.textContent = 'Uploading & parsing…';

    const form = new FormData();
    form.append('file', file);
    const name = getUserName();
    if (name) form.append('uploaded_by', name);

    try {
      const res = await fetch('/parse', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || res.statusText);
      if (data.already_parsed) {
        statusEl.style.color = 'var(--accent)';
        statusEl.textContent = `This demo was already analyzed (match #${data.id}). Showing existing results.`;
      } else {
        statusEl.style.color = 'var(--green)';
        statusEl.textContent = `Parsed! Match #${data.match_id} saved.`;
      }
      setTimeout(() => renderDashboard(), 800);
    } catch (e) {
      btn.disabled = false;
      statusEl.style.color = 'var(--red)';
      statusEl.textContent = `Error: ${e.message}`;
    }
  });
}


// ── Match Detail ──────────────────────────────────────────────────────────────

async function renderMatchDetail(id) {
  app.innerHTML = '<div class="loading">Loading match…</div>';

  let data;
  try {
    const res = await fetch(`/matches/${id}`);
    if (!res.ok) { app.innerHTML = `<div class="error">Match not found.</div>`; return; }
    data = await res.json();
  } catch (e) {
    app.innerHTML = `<div class="error">${e.message}</div>`;
    return;
  }

  const kills   = data.kills   || [];
  const rounds  = data.rounds  || [];
  const ratings = data.ratings || [];
  const header  = data.header  || {};
  _currentRatings = ratings;
  _ratingsTab     = 'overview';

  const hs = kills.filter(k => k.headshot).length;
  const hsRate = kills.length ? Math.round(hs / kills.length * 100) : 0;

  app.innerHTML = `
    ${detailHeader(data, header)}
    ${detailStats(kills.length, rounds, hsRate)}
    ${detailRatings(ratings)}
    ${detailFlashClutch(ratings)}
    ${rounds.length  ? detailRounds(rounds)         : ''}
    ${kills.length   ? detailKills(kills)            : ''}
    ${detailBomb(data.bomb_events || {})}
    ${detailRaw(data)}
    ${detailMeta(data, header)}
  `;
}

function detailHeader(m, header) {
  const mapName = m.map_name || header.map_name || '';
  const bgStyle = mapName
    ? `background-image: url('/static/maps/${encodeURIComponent(mapName)}.png')`
    : `background: #1a1c28`;

  return `<div class="match-hero">
    <div class="match-hero-bg" style="${bgStyle}"></div>
    <div class="match-hero-overlay"></div>
    <div class="match-hero-content">
      <div class="match-hero-map">
        ${esc(mapName || 'Unknown Map')}
        ${isAdmin() ? `<button class="download-btn match-hero-admin" style="border-color:var(--red);color:var(--red);vertical-align:middle"
          onclick="deleteMatch(${m.id}, this, true)">Remove match</button>` : ''}
      </div>
    </div>
  </div>`;
}

function detailMeta(m, header) {
  const entries = [
    ['Map',         m.map_name    || header.map_name    || '—'],
    ['Server',      m.server_name || header.server_name || header.client_name || '—'],
    ['Patch',       m.patch_version || header.patch_version || '—'],
    ['Rounds',      m.total_rounds ?? '—'],
    ['Uploaded',    fmtDate(m.uploaded_at)],
    ...(m.uploaded_by ? [['Uploaded by', m.uploaded_by]] : []),
    ['File',        m.filename || '—'],
  ];
  const rows = entries.map(([k,v]) => `<dt>${k}</dt><dd>${esc(String(v))}</dd>`).join('');
  return `<div class="card">
    <div class="card-title">Match Info</div>
    <dl class="kv-grid">${rows}</dl>
  </div>`;
}

function detailStats(kills, rounds, hsRate) {
  const ctWins = rounds.filter(r => r.winner === 'CT').length;
  const tWins  = rounds.filter(r => r.winner === 'TERRORIST' || r.winner === 'T').length;
  const score  = rounds.length
    ? `<span class="side-ct">${ctWins}</span><span style="color:var(--muted);margin:0 .3rem">:</span><span class="side-t">${tWins}</span>`
    : '—';

  return `<div class="card"><div class="stat-row">
    <div class="stat"><div class="num">${score}</div><div class="lbl">Score (CT : T)</div></div>
    <div class="stat"><div class="num">${rounds.length}</div><div class="lbl">Rounds</div></div>
    <div class="stat"><div class="num">${kills}</div><div class="lbl">Kills</div></div>
    <div class="stat"><div class="num">${hsRate}%</div><div class="lbl">HS Rate</div></div>
  </div></div>`;
}

function mkBadges(mk) {
  if (!mk) return '';
  const labels = { '2': '2K', '3': '3K', '4': '4K', '5': 'ACE' };
  const colors  = { '2': '#888', '3': '#f0a500', '4': '#5baeff', '5': '#4caf7d' };
  return Object.entries(mk).map(([k, v]) =>
    `<span style="background:#111318;border:1px solid ${colors[k]};color:${colors[k]};border-radius:3px;padding:.1rem .35rem;font-size:.7rem;font-weight:700;margin-left:.2rem">${labels[k]}×${v}</span>`
  ).join('');
}

let _ratingsTab = 'overview';

function detailRatings(ratings) {
  const ct = ratings.filter(p => p.team === 'CT');
  const t  = ratings.filter(p => p.team === 'TERRORIST');

  function overviewRows(list) {
    return list.map(p => `<div class="ov-row">
      <span class="ov-row-name" title="${esc(p.name)}">${esc(p.name)}</span>
      <div class="ov-stat"><span class="ov-stat-val ${rClass(p.rating)}">${Number(p.rating).toFixed(2)}</span><span class="ov-stat-lbl">Rating</span></div>
      <div class="ov-stat"><span class="ov-stat-val">${p.kills}/${p.deaths}</span><span class="ov-stat-lbl">K/D</span></div>
      <div class="ov-stat"><span class="ov-stat-val">${p.kast}%</span><span class="ov-stat-lbl">KAST</span></div>
      <div class="ov-stat"><span class="ov-stat-val">${p.adr}</span><span class="ov-stat-lbl">ADR</span></div>
      <div class="ov-stat"><span class="ov-stat-val">${p.hs_pct ?? '—'}%</span><span class="ov-stat-lbl">HS%</span></div>
    </div>`).join('');
  }

  function detailRows(list) {
    return list.map(p => {
      const mk     = typeof p.multi_kills === 'string' ? JSON.parse(p.multi_kills || '{}') : (p.multi_kills || {});
      const ctR    = p.ct_rating != null ? `<span class="${rClass(p.ct_rating)}" style="font-size:.72rem">CT ${p.ct_rating.toFixed(2)}</span>` : '';
      const tR     = p.t_rating  != null ? `<span class="${rClass(p.t_rating)}"  style="font-size:.72rem">T ${p.t_rating.toFixed(2)}</span>`  : '';
      const clutch = p.clutch_total ? `${p.clutch_won}/${p.clutch_total}` : '';
      return `<div class="rating-row" style="flex-wrap:wrap;gap:.35rem">
        <span class="rating-row-name" title="${esc(p.name)}">${esc(p.name)}</span>
        <span class="rating-row-meta">
          <span>K/D <b>${p.kills}/${p.deaths}</b></span>
          <span>ADR <b>${p.adr}</b></span>
          <span>HS <b>${p.hs_pct ?? '—'}%</b></span>
          <span>KAST <b>${p.kast}%</b></span>
          ${p.flash_enemies ? `<span>Flash <b>${p.flash_enemies}</b></span>` : ''}
          ${clutch ? `<span>Clutch <b>${clutch}</b></span>` : ''}
          ${p.knife_kills ? `<span>🔪 <b>${p.knife_kills}</b></span>` : ''}
          ${p.zeus_kills  ? `<span>⚡ <b>${p.zeus_kills}</b></span>`  : ''}
        </span>
        <span style="display:flex;align-items:center;gap:.4rem;margin-left:auto">
          ${ctR} ${tR}
          ${mkBadges(mk)}
          <span class="rating-num ${rClass(p.rating)}">${Number(p.rating).toFixed(2)}</span>
        </span>
      </div>`;
    }).join('');
  }

  const isOverview = _ratingsTab === 'overview';
  const board = isOverview
    ? `<div class="rating-board">
        <div class="rating-team ct"><h3>Counter-Terrorists</h3>${overviewRows(ct)}</div>
        <div class="rating-team t"><h3>Terrorists</h3>${overviewRows(t)}</div>
       </div>`
    : `<div class="rating-board">
        <div class="rating-team ct"><h3>Counter-Terrorists</h3>${detailRows(ct)}</div>
        <div class="rating-team t"><h3>Terrorists</h3>${detailRows(t)}</div>
       </div>
       <p class="formula-note">Rating = 0.0073·KAST + 0.3591·KPR − 0.5329·DPR + 0.2372·Impact + 0.0032·ADR + 0.1587</p>`;

  // Opening kills table
  const sorted  = [...ratings].sort((a,b) => (b.opening_kills||0) - (a.opening_kills||0));
  const openers = sorted.filter(p => p.opening_attempts > 0).map(p => {
    const pct = p.opening_attempts ? Math.round(p.opening_kills / p.opening_attempts * 100) : 0;
    return `<tr><td>${esc(p.name)}</td><td>${p.opening_kills ?? 0}</td><td>${p.opening_attempts ?? 0}</td><td>${pct}%</td></tr>`;
  }).join('');

  return `<div class="card" id="ratings-card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem">
      <div class="card-title" style="margin-bottom:0">HLTV 2.0 Rating</div>
      <div class="detail-tabs">
        <button class="detail-tab${isOverview ? ' active' : ''}" onclick="switchRatingsTab('overview')">Overview</button>
        <button class="detail-tab${!isOverview ? ' active' : ''}" onclick="switchRatingsTab('details')">Details</button>
      </div>
    </div>
    ${board}
    ${openers ? `<div style="margin-top:1rem">
      <div class="card-title" style="margin-bottom:.5rem">Opening Duels</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Player</th><th>Opening Kills</th><th>Duels</th><th>Win%</th></tr></thead>
        <tbody>${openers}</tbody>
      </table></div>
    </div>` : ''}
  </div>`;
}

function switchRatingsTab(tab) {
  _ratingsTab = tab;
  const card = document.getElementById('ratings-card');
  if (card) card.outerHTML = detailRatings(_currentRatings);
}

let _currentRatings = [];

function detailFlashClutch(ratings) {
  const flashers = [...ratings]
    .filter(p => p.flash_enemies > 0)
    .sort((a, b) => b.flash_enemies - a.flash_enemies);

  const clutchers = [...ratings]
    .filter(p => p.clutch_total > 0)
    .sort((a, b) => b.clutch_total - a.clutch_total);

  if (!flashers.length && !clutchers.length) return '';

  const flashRows = flashers.map(p => `<tr>
    <td>${esc(p.name)}</td>
    <td>${p.flash_enemies}</td>
    <td>${p.flash_avg_dur != null ? Number(p.flash_avg_dur).toFixed(2) + 's' : '—'}</td>
  </tr>`).join('');

  const clutchRows = clutchers.map(p => {
    const pct = Math.round(p.clutch_won / p.clutch_total * 100);
    return `<tr>
      <td>${esc(p.name)}</td>
      <td>${p.clutch_won}/${p.clutch_total}</td>
      <td>${pct}%</td>
    </tr>`;
  }).join('');

  return `<div class="card" style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
    ${flashRows ? `<div>
      <div class="card-title" style="margin-bottom:.5rem">Flash Effectiveness</div>
      <table>
        <thead><tr><th>Player</th><th>Enemies Blinded</th><th>Avg Duration</th></tr></thead>
        <tbody>${flashRows}</tbody>
      </table>
    </div>` : '<div></div>'}
    ${clutchRows ? `<div>
      <div class="card-title" style="margin-bottom:.5rem">Clutch Rounds (1vX)</div>
      <table>
        <thead><tr><th>Player</th><th>Won/Total</th><th>Win%</th></tr></thead>
        <tbody>${clutchRows}</tbody>
      </table>
    </div>` : '<div></div>'}
  </div>`;
}

function detailRounds(rounds) {
  const rows = rounds.map(r => `<tr>
    <td>${r.round ?? r.total_rounds_played ?? '—'}</td>
    <td>${tag(r.winner, r.winner === 'CT' ? 'ct' : 't')}</td>
    <td>${r.reason ?? '—'}</td>
    <td>${r.tick ?? '—'}</td>
  </tr>`).join('');
  return `<div class="card">
    <div class="card-title">Rounds (${rounds.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>Winner</th><th>Reason</th><th>Tick</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>`;
}

function detailKills(kills) {
  const rows = kills.slice(0, 300).map(k => `<tr>
    <td>${esc(k.attacker_name ?? '—')} ${tag(k.attacker_team_name ?? '', k.attacker_team_name === 'CT' ? 'ct' : 't')}</td>
    <td>${esc(k.user_name ?? '—')} ${tag(k.user_team_name ?? '', k.user_team_name === 'CT' ? 'ct' : 't')}</td>
    <td>${k.weapon ?? '—'}</td>
    <td>${k.headshot ? tag('HS','hs') : ''}</td>
    <td>${k.distance != null ? Number(k.distance).toFixed(1) : '—'}</td>
    <td>${k.total_rounds_played ?? '—'}</td>
  </tr>`).join('');
  const note = kills.length > 300 ? `<p style="color:var(--muted);font-size:.8rem;margin-top:.5rem">Showing first 300 of ${kills.length}</p>` : '';
  return `<div class="card">
    <div class="card-title">Kill Feed (${kills.length})</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Attacker</th><th>Victim</th><th>Weapon</th><th></th><th>Distance</th><th>Round</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>${note}
  </div>`;
}

function detailBomb(bombEvents) {
  const sections = Object.entries(bombEvents).map(([ev, rows]) => {
    if (!rows.length) return '';
    return `<p style="color:var(--accent);margin:.6rem 0 .3rem;font-size:.82rem;font-weight:700">${ev} (${rows.length})</p>
      <div class="table-wrap"><table>
        <thead><tr>${Object.keys(rows[0]).map(k=>`<th>${k}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(0,50).map(r=>`<tr>${Object.values(r).map(v=>`<td>${v??'—'}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>`;
  }).join('');
  if (!sections) return '';
  return `<div class="card"><div class="card-title">Bomb Events</div>${sections}</div>`;
}

function detailRaw(data) {
  const summary = JSON.stringify({
    header: data.header,
    map_name: data.map_name,
    total_rounds: data.total_rounds,
    ratings_count: (data.ratings||[]).length,
    kills_count: (data.kills||[]).length,
  }, null, 2);

  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);

  return `<div class="card">
    <div class="card-title" style="display:flex;align-items:center;gap:1rem">
      Raw JSON
      <a href="${url}" download="match_${data.id || 'data'}.json" style="text-decoration:none">
        <button class="download-btn">Download full JSON</button>
      </a>
    </div>
    <pre style="background:#111318;border:1px solid var(--border);border-radius:6px;padding:1rem;font-size:.78rem;overflow:auto;max-height:280px;color:#ccc">${esc(summary)}</pre>
  </div>`;
}


// ── Charts ───────────────────────────────────────────────────────────────────

// Destroy existing chart instances before re-render
const _charts = {};

function chartsSection(stats, leaderboard) {
  if (!stats.player_history.length) return '';
  return `<div class="charts-row">
    <div class="card" style="margin-bottom:0">
      <div class="card-title">Player Rating History</div>
      <div class="chart-wrap"><canvas id="chartRating" height="220"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:0">
      <div class="card-title">Maps Played</div>
      <div class="chart-wrap"><canvas id="chartMaps" height="220"></canvas></div>
    </div>
  </div>`;
}

function renderCharts(stats, leaderboard) {
  if (!stats.player_history.length) return;

  // ── Palette ──
  const PALETTE = [
    '#f0a500','#5baeff','#4caf7d','#e05555','#b47fe8',
    '#ff8c42','#00c9c8','#f06292','#aed581','#90a4ae',
  ];

  // ── 1. Rating history line chart ──────────────────────────────────────────
  // Build ordered match list
  const matchOrder = [];
  const seen = new Set();
  for (const r of stats.player_history) {
    if (!seen.has(r.match_id)) {
      seen.add(r.match_id);
      matchOrder.push({ id: r.match_id, map: r.map_name, date: r.uploaded_at });
    }
  }

  // Top players by avg rating from leaderboard (cap at 8 for readability)
  const topPlayers = leaderboard.slice(0, 8).map(p => p.steamid);

  // Group ratings: steamid -> match_id -> rating
  const ratingMap = {};
  for (const r of stats.player_history) {
    if (!topPlayers.includes(r.steamid)) continue;
    if (!ratingMap[r.steamid]) ratingMap[r.steamid] = { name: r.name, ratings: {} };
    ratingMap[r.steamid].ratings[r.match_id] = r.rating;
  }

  const lineLabels = matchOrder.map(m =>
    `${m.map.replace('de_', '')} #${m.id}`
  );

  const lineDatasets = topPlayers
    .filter(sid => ratingMap[sid])
    .map((sid, i) => {
      const { name, ratings } = ratingMap[sid];
      return {
        label: name,
        data: matchOrder.map(m => ratings[m.id] ?? null),
        borderColor: PALETTE[i % PALETTE.length],
        backgroundColor: PALETTE[i % PALETTE.length] + '22',
        tension: 0.3,
        pointRadius: 4,
        pointHoverRadius: 6,
        spanGaps: true,
        borderWidth: 2,
      };
    });

  if (_charts.rating) _charts.rating.destroy();
  const ctxR = document.getElementById('chartRating');
  if (!ctxR) return;
  _charts.rating = new Chart(ctxR, {
    type: 'line',
    data: { labels: lineLabels, datasets: lineDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#888', font: { size: 11 }, boxWidth: 12,
            padding: 10,
          },
        },
        tooltip: {
          backgroundColor: '#1a1c24',
          borderColor: '#2a2d38',
          borderWidth: 1,
          titleColor: '#f0a500',
          bodyColor: '#ccc',
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y?.toFixed(2) ?? '—'}`,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#666', font: { size: 11 } },
          grid: { color: '#1e2030' },
        },
        y: {
          min: 0,
          ticks: { color: '#666', font: { size: 11 } },
          grid: { color: '#1e2030' },
        },
      },
    },
  });

  // ── 2. Map distribution donut ─────────────────────────────────────────────
  const mapNames  = Object.keys(stats.map_distribution);
  const mapCounts = Object.values(stats.map_distribution);
  const mapColors = mapNames.map((_, i) => PALETTE[i % PALETTE.length]);

  if (_charts.maps) _charts.maps.destroy();
  const ctxM = document.getElementById('chartMaps');
  if (!ctxM) return;
  _charts.maps = new Chart(ctxM, {
    type: 'doughnut',
    data: {
      labels: mapNames.map(n => n.replace('de_', '')),
      datasets: [{
        data: mapCounts,
        backgroundColor: mapColors,
        borderColor: '#0f1117',
        borderWidth: 3,
        hoverOffset: 6,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#888', font: { size: 11 }, boxWidth: 12, padding: 10,
          },
        },
        tooltip: {
          backgroundColor: '#1a1c24',
          borderColor: '#2a2d38',
          borderWidth: 1,
          titleColor: '#f0a500',
          bodyColor: '#ccc',
          callbacks: {
            label: ctx => {
              const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
              const pct = Math.round(ctx.parsed / total * 100);
              return ` ${ctx.parsed} match${ctx.parsed > 1 ? 'es' : ''} (${pct}%)`;
            },
          },
        },
      },
    },
  });
}


// ── Delete match ─────────────────────────────────────────────────────────────

async function deleteMatch(id, btn, redirect = false) {
  const answer = prompt(`Type DELETE to confirm removing match #${id}.\nThis will revert its impact on all stats and cannot be undone.`);
  if (answer !== 'DELETE') return;

  btn.disabled = true;
  btn.textContent = '…';

  try {
    const res = await fetch(`/matches/${id}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${getAdminToken()}` },
    });
    if (!res.ok) throw new Error((await res.json()).detail || res.statusText);
    if (redirect) {
      navigate('');
    } else {
      // Remove tile from grid without full re-render
      const tile = btn.closest('.match-tile');
      tile.style.transition = 'opacity .25s';
      tile.style.opacity = '0';
      setTimeout(() => { tile.remove(); refreshLeaderboard(); }, 260);
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '✕';
    alert(`Delete failed: ${e.message}`);
  }
}

    const card = document.querySelector('.card');  // leaderboard is second card
    // Re-render the whole dashboard is simpler here

// ── Player Profile ────────────────────────────────────────────────────────────

async function renderPlayerProfile(steamid) {
  app.innerHTML = '<div class="loading">Loading player…</div>';

  let data;
  try {
    const res = await fetch(`/players/${encodeURIComponent(steamid)}`);
    if (!res.ok) { app.innerHTML = `<div class="error">Player not found.</div>`; return; }
    data = await res.json();
  } catch (e) {
    app.innerHTML = `<div class="error">${e.message}</div>`;
    return;
  }

  const fav = (data.map_stats || [])[0];
  const kd  = data.total_deaths ? (data.total_kills / data.total_deaths).toFixed(2) : '—';
  const openPct = data.total_opening_attempts
    ? Math.round(data.total_opening_kills / data.total_opening_attempts * 100) + '%'
    : '—';
  const clutchPct = data.total_clutch_total
    ? `${data.total_clutch_won}/${data.total_clutch_total} (${Math.round(data.total_clutch_won / data.total_clutch_total * 100)}%)`
    : '—';
  const avgFlash = data.total_flash_enemies != null
    ? (data.total_flash_enemies / (data.matches_played || 1)).toFixed(1)
    : '—';

  const statCards = [
    ['Rating',        fmtRating(data.avg_rating)],
    ['ADR',           data.avg_adr ?? '—'],
    ['KAST',          data.avg_kast != null ? data.avg_kast + '%' : '—'],
    ['HS%',           data.avg_hs_pct != null ? data.avg_hs_pct + '%' : '—'],
    ['K/D',           kd],
    ['Opening%',      openPct],
    ['Clutch',        clutchPct],
    ['Avg Flashed',   avgFlash + '/match'],
    ['🔪 Knife',      data.total_knife_kills || 0],
    ['⚡ Zeus',       data.total_zeus_kills  || 0],
    ['Maps played',   data.matches_played ?? 0],
    ['Total rounds',  data.total_rounds ?? 0],
  ].map(([lbl, val]) => `<div class="stat"><div class="num">${val}</div><div class="lbl">${lbl}</div></div>`).join('');

  const favSection = fav ? `<div class="card">
    <div class="card-title">Favourite Map</div>
    <div style="display:flex;align-items:center;gap:2rem;flex-wrap:wrap">
      <span style="font-size:1.4rem;font-weight:700;color:var(--accent)">${esc(fav.map_name || '—').replace('de_','')}</span>
      <div class="stat-row" style="gap:1.5rem;margin:0">
        <div class="stat"><div class="num">${fmtRating(fav.avg_rating)}</div><div class="lbl">Rating</div></div>
        <div class="stat"><div class="num">${fav.avg_adr ?? '—'}</div><div class="lbl">ADR</div></div>
        <div class="stat"><div class="num">${fav.avg_kast != null ? fav.avg_kast + '%' : '—'}</div><div class="lbl">KAST</div></div>
        <div class="stat"><div class="num">${fav.avg_hs_pct != null ? fav.avg_hs_pct + '%' : '—'}</div><div class="lbl">HS%</div></div>
        <div class="stat"><div class="num">${fav.matches ?? 0}</div><div class="lbl">Matches</div></div>
      </div>
    </div>
  </div>` : '';

  const mapRows = (data.map_stats || []).map(m => {
    const mkd = m.total_deaths ? (m.total_kills / m.total_deaths).toFixed(2) : '—';
    return `<tr>
      <td>${esc(m.map_name || '—')}</td>
      <td>${m.matches}</td>
      <td>${fmtRating(m.avg_rating)}</td>
      <td>${m.avg_adr ?? '—'}</td>
      <td>${m.avg_kast != null ? m.avg_kast + '%' : '—'}</td>
      <td>${m.avg_hs_pct != null ? m.avg_hs_pct + '%' : '—'}</td>
      <td class="kd">${m.total_kills}/${m.total_deaths}</td>
      <td>${m.total_flash_enemies ?? '—'}</td>
    </tr>`;
  }).join('');

  const matchRows = (data.matches || []).slice().reverse().map(m => {
    const mk = typeof m.multi_kills === 'string' ? JSON.parse(m.multi_kills || '{}') : (m.multi_kills || {});
    const ctR = m.ct_rounds > 0 ? `<span class="${rClass(m.ct_rating)}" style="font-size:.72rem">CT ${m.ct_rating?.toFixed(2) ?? '—'}</span>` : '';
    const tR  = m.t_rounds  > 0 ? `<span class="${rClass(m.t_rating)}"  style="font-size:.72rem">T ${m.t_rating?.toFixed(2) ?? '—'}</span>` : '';
    return `<tr onclick="navigate('match/${m.match_id}')" style="cursor:pointer">
      <td>${fmtDate(m.uploaded_at)}</td>
      <td>${esc(m.map_name || '—')}</td>
      <td>${fmtRating(m.rating)}</td>
      <td>${ctR} ${tR}</td>
      <td class="kd">${m.kills}/${m.deaths}</td>
      <td>${m.adr ?? '—'}</td>
      <td>${m.kast != null ? m.kast + '%' : '—'}</td>
      <td>${m.hs_pct != null ? m.hs_pct + '%' : '—'}</td>
      <td>${m.flash_enemies || '—'}</td>
      <td>${m.clutch_total ? `${m.clutch_won}/${m.clutch_total}` : '—'}</td>
      <td>${mkBadges(mk)}</td>
    </tr>`;
  }).join('');

  app.innerHTML = `
    <div class="card">
      <div class="card-title" style="font-size:.9rem">${esc(data.name || steamid)}</div>
      <div class="stat-row" style="flex-wrap:wrap;gap:.75rem">${statCards}</div>
    </div>
    ${favSection}
    ${mapRows ? `<div class="card">
      <div class="card-title">Map Breakdown</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Map</th><th>Matches</th><th>Rating</th><th>ADR</th><th>KAST</th><th>HS%</th><th>K/D</th><th>Flashes</th></tr></thead>
        <tbody>${mapRows}</tbody>
      </table></div>
    </div>` : ''}
    <div class="card">
      <div class="card-title">Match History (newest first)</div>
      <div class="chart-wrap"><canvas id="chartPlayerRating" height="200"></canvas></div>
    </div>
    ${matchRows ? `<div class="card">
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Map</th><th>Rating</th><th>CT/T</th><th>K/D</th><th>ADR</th><th>KAST</th><th>HS%</th><th>Flash</th><th>Clutch</th><th>MK</th></tr></thead>
        <tbody>${matchRows}</tbody>
      </table></div>
    </div>` : '<div class="card"><p class="empty-state">No match history.</p></div>'}
  `;

  // Rating trend chart (chronological)
  const mHistory = (data.matches || []);
  if (mHistory.length > 0) {
    const labels   = mHistory.map(m => `${(m.map_name || '?').replace('de_','')} #${m.match_id}`);
    const ratings  = mHistory.map(m => m.rating);
    if (_charts.playerRating) _charts.playerRating.destroy();
    const ctx = document.getElementById('chartPlayerRating');
    if (ctx) {
      _charts.playerRating = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: data.name || steamid,
            data: ratings,
            borderColor: '#f0a500',
            backgroundColor: '#f0a50022',
            tension: 0.3,
            pointRadius: 5,
            pointHoverRadius: 7,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1a1c24',
              borderColor: '#2a2d38',
              borderWidth: 1,
              titleColor: '#f0a500',
              bodyColor: '#ccc',
              callbacks: { label: ctx => ` Rating: ${ctx.parsed.y?.toFixed(2) ?? '—'}` },
            },
          },
          scales: {
            x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1e2030' } },
            y: { min: 0, ticks: { color: '#666', font: { size: 11 } }, grid: { color: '#1e2030' } },
          },
        },
      });
    }
  }
}


// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
